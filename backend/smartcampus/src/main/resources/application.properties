spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smartcampus}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smartcampus}
spring.data.mongodb.auto-index-creation=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB
spring.web.resources.static-locations=classpath:/static/,file:uploads/

app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
auth.jwt.secret=${AUTH_JWT_SECRET:smart-campus-group58-local-demo-secret-2026}
auth.jwt.expiration-seconds=${AUTH_JWT_EXPIRATION_SECONDS:86400}

spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.admin-name=${APP_SEED_ADMIN_NAME:Group 58 Admin}
app.seed.admin-email=${APP_SEED_ADMIN_EMAIL:admin@example.com}
app.seed.admin-password=${APP_SEED_ADMIN_PASSWORD:ChangeMe123!}
app.seed.user-name=${APP_SEED_USER_NAME:Group 58 Student}
app.seed.user-email=${APP_SEED_USER_EMAIL:student@example.com}
app.seed.user-password=${APP_SEED_USER_PASSWORD:ChangeMe123!}
app.seed.technician-name=${APP_SEED_TECHNICIAN_NAME:Group 58 Technician}
app.seed.technician-email=${APP_SEED_TECHNICIAN_EMAIL:technician@example.com}
app.seed.technician-password=${APP_SEED_TECHNICIAN_PASSWORD:ChangeMe123!}
